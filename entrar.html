<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presença Viva — Entrar</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Lato:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0d14;color:#e8d9b5;font-family:'Lato',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 30% 40%,rgba(201,168,76,.07) 0%,transparent 60%);pointer-events:none}
.box{width:100%;max-width:380px;position:relative;z-index:1}
.logo{text-align:center;margin-bottom:32px}
.cruz{width:28px;height:36px;position:relative;margin:0 auto 12px}
.cruz::before{content:'';position:absolute;left:50%;top:0;transform:translateX(-50%);width:5px;height:100%;background:#c9a84c;border-radius:3px}
.cruz::after{content:'';position:absolute;left:0;top:9px;width:100%;height:5px;background:#c9a84c;border-radius:3px}
h1{font-family:'Cinzel',serif;font-size:1.4rem;color:#e8cc7e;letter-spacing:.05em}
.sub{color:#a09070;font-size:.85rem;margin-top:6px}
.card{background:#111520;border:1px solid rgba(201,168,76,.15);border-radius:14px;padding:28px 24px}
label{display:block;font-size:.72rem;color:#a09070;text-transform:uppercase;letter-spacing:.07em;font-weight:700;margin-bottom:6px;margin-top:16px}
label:first-of-type{margin-top:0}
input{width:100%;background:#181e2e;border:1.5px solid #222840;border-radius:10px;padding:13px 14px;color:#e8e0d0;font-size:.95rem;font-family:'Lato',sans-serif;outline:none;transition:border .2s}
input:focus{border-color:#c9a84c}
input::placeholder{color:#3a3830}
.btn{width:100%;background:linear-gradient(135deg,#c9a84c,#e8cc7e);color:#0a0d14;border:none;border-radius:10px;padding:14px;font-size:1rem;font-weight:700;font-family:'Lato',sans-serif;cursor:pointer;margin-top:20px;transition:all .2s}
.btn:disabled{opacity:.6;cursor:not-allowed}
.err{background:rgba(156,90,106,.12);border:1px solid rgba(156,90,106,.25);color:#e0909a;border-radius:8px;padding:10px 12px;font-size:.85rem;margin-top:12px;display:none}
.hint{text-align:center;margin-top:16px;font-size:.82rem;color:#5a5040}
.hint a{color:#c9a84c;text-decoration:none}
.novo{text-align:center;margin-top:12px;font-size:.82rem;color:#5a5040}
.novo a{color:#c9a84c;text-decoration:none}
</style>
</head>
<body>
<div class="box">
  <div class="logo">
    <div class="cruz"></div>
    <h1>Presença Viva</h1>
    <p class="sub">Aprofunde sua caminhada com Deus</p>
  </div>

  <div class="card">
    <label>Seu nome</label>
    <input id="nome" type="text" placeholder="Como você se chama..." autocomplete="name">

    <label>Senha de acesso</label>
    <input id="senha" type="password" placeholder="Sua senha..." autocomplete="current-password">

    <div class="err" id="err"></div>
    <button class="btn" id="btn" onclick="entrar()">Entrar na Presença →</button>
  </div>

  <div class="hint">Primeiro acesso? <a href="https://wa.me/5534984314362" target="_blank">Fale com o suporte</a></div>
</div>

<script>
// SENHAS VÁLIDAS — adicione aqui conforme ativar usuários
// Formato: 'senha': true
var SENHAS = {
  'ekklesia2025': true
  // Adicione mais quando ativar usuários:
  // 'senha123': true,
};

// Se já tem dados salvos, vai direto pro app
try {
  var s = localStorage.getItem('pv2');
  if(s){ var d=JSON.parse(s); if(d&&d.name&&d.name.length>1) window.location.replace('presenca-viva-app.html'); }
} catch(e){}

function entrar(){
  var nome = (document.getElementById('nome').value||'').trim();
  var senha = (document.getElementById('senha').value||'').trim().toLowerCase();
  var err = document.getElementById('err');
  var btn = document.getElementById('btn');

  err.style.display='none';
  if(!nome){err.textContent='Digite seu nome.';err.style.display='block';return;}
  if(!senha){err.textContent='Digite sua senha.';err.style.display='block';return;}
  if(!SENHAS[senha]){err.textContent='Senha incorreta. Entre em contato com o suporte.';err.style.display='block';return;}

  btn.textContent='✦ Entrando...';btn.disabled=true;

  try{
    var dados={name:nome,xp:0,level:1,profile:{},birthday:'',gender:'',
      missionsCompleted:[],missionFields:{},missionActive:{},missionDays:{},
      fastingActive:{},fastingDaysDone:{},fastingNotes:{},fastingType:{},
      finEntries:[],finBudget:{},finGoals:[],finMissions:[],
      dreams:[],conquests:[],conquestMissions:[],promises:[],
      relationshipData:{},childrenData:{},ministryData:{},
      bibleNotes:[],readChapters:{},readingPlan:{plan:'cronologico',daysRead:[]},
      prayerRequests:[],devotRead:{},devotDeclarations:{},devotGodNotes:{},
      confessionsDeclared:[],godLetters:[],familyMembers:[],familyEvents:{},
      referralCodes:[],discountPercent:0,agendaEvents:[],agendaTab:'pessoal'};
    localStorage.setItem('pv2',JSON.stringify(dados));
    localStorage.setItem('pv_name_backup',nome);
  }catch(e){}

  setTimeout(function(){window.location.href='presenca-viva-app.html';},400);
}

document.addEventListener('keydown',function(e){if(e.key==='Enter')entrar();});
</script>
</body>
</html>
