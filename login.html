<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrar — Presença Viva</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root{--gold:#c9a84c;--gold-light:#e8cc7e;--dark:#0a0d14;--dark2:#111520;--dark3:#181e2e;--dark4:#222840;--text:#e8e0d0;--text-muted:#a09070;--text-dim:#5a5040;--r:12px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Lato',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 30% 40%,rgba(201,168,76,.08) 0%,transparent 60%);pointer-events:none}
.box{background:var(--dark2);border:1px solid rgba(201,168,76,.2);border-radius:16px;padding:40px 36px;width:100%;max-width:400px;position:relative;z-index:1}
.logo{text-align:center;margin-bottom:28px}
.cruz{width:32px;height:40px;position:relative;margin:0 auto 10px}
.cruz::before{content:'';position:absolute;left:50%;top:0;transform:translateX(-50%);width:5px;height:100%;background:var(--gold);border-radius:3px}
.cruz::after{content:'';position:absolute;left:0;top:11px;width:100%;height:5px;background:var(--gold);border-radius:3px}
.logo h1{font-family:'Cinzel',serif;font-size:1.3rem;color:var(--gold-light);letter-spacing:.06em}
.logo p{font-size:.82rem;color:var(--text-muted);margin-top:6px}
.field{margin-bottom:16px}
.field label{display:block;font-size:.74rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.07em;font-weight:700;margin-bottom:6px}
.field input{width:100%;background:var(--dark3);border:1.5px solid var(--dark4);border-radius:var(--r);padding:13px 14px;color:var(--text);font-size:.95rem;font-family:'Lato',sans-serif;outline:none;transition:border .2s}
.field input:focus{border-color:var(--gold)}
.field input::placeholder{color:var(--text-dim)}
.btn-main{width:100%;background:linear-gradient(135deg,var(--gold),var(--gold-light));color:var(--dark);border:none;border-radius:var(--r);padding:14px;font-size:1rem;font-weight:700;font-family:'Lato',sans-serif;cursor:pointer;margin-top:4px;transition:all .2s}
.btn-main:hover{filter:brightness(1.08)}
.btn-main:disabled{opacity:.6;cursor:not-allowed}
.msg{border-radius:8px;padding:12px 14px;font-size:.88rem;margin-bottom:14px;display:none}
.msg.err{background:rgba(156,90,106,.15);border:1px solid rgba(156,90,106,.3);color:#e0909a;display:block}
.msg.ok{background:rgba(74,140,106,.15);border:1px solid rgba(74,140,106,.3);color:#7dc49a;display:block}
.back{text-align:center;margin-top:18px;font-size:.85rem;color:var(--text-dim)}
.back a{color:var(--gold);text-decoration:none}
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--dark);border-top-color:transparent;border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes sp{to{transform:rotate(360deg)}}
.tabs{display:flex;background:var(--dark3);border-radius:10px;padding:3px;margin-bottom:24px}
.tab-btn{flex:1;padding:10px 8px;border:none;background:none;color:var(--text-muted);font-family:'Lato',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;border-radius:8px;transition:all .25s}
.tab-btn.on{background:rgba(201,168,76,.18);color:var(--gold)}
.form-block{display:none}
.form-block.on{display:block}
.divider{text-align:center;color:var(--text-dim);font-size:.8rem;margin:16px 0;position:relative}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:var(--dark4)}
.divider::before{left:0}.divider::after{right:0}
.code-hint{background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.15);border-radius:8px;padding:10px 12px;font-size:.82rem;color:var(--text-muted);margin-bottom:14px;line-height:1.5}
</style>
</head>
<body>
<div class="box">
  <div class="logo">
    <div class="cruz"></div>
    <h1>Presença Viva</h1>
    <p>Aprofunde sua caminhada com Deus</p>
  </div>

  <div id="msg" class="msg"></div>

  <div class="tabs">
    <button class="tab-btn on" onclick="showTab('entrar',this)">Entrar</button>
    <button class="tab-btn" onclick="showTab('criar',this)">Criar conta</button>
  </div>

  <!-- ENTRAR -->
  <div class="form-block on" id="form-entrar">
    <div class="field">
      <label>Seu nome</label>
      <input id="login-name" type="text" placeholder="Como você se chama...">
    </div>
    <div class="field">
      <label>Código de acesso</label>
      <input id="login-code" type="password" placeholder="Código recebido...">
    </div>
    <button class="btn-main" onclick="doLogin()" id="btn-login">Entrar na Presença →</button>
    <div class="divider">ou</div>
    <div class="code-hint">
      💬 Não tem código ainda? Fale com o suporte:<br>
      <strong style="color:var(--gold)">wa.me/5534984314362</strong>
    </div>
  </div>

  <!-- CRIAR CONTA -->
  <div class="form-block" id="form-criar">
    <div class="field">
      <label>Seu nome</label>
      <input id="reg-name" type="text" placeholder="Seu nome completo...">
    </div>
    <div class="field">
      <label>Seu WhatsApp</label>
      <input id="reg-phone" type="tel" placeholder="(34) 99999-9999">
    </div>
    <div class="field">
      <label>Código de indicação (opcional)</label>
      <input id="reg-ref" type="text" placeholder="PV-000001" style="text-transform:uppercase">
    </div>
    <button class="btn-main" onclick="doRegister()" id="btn-register">Solicitar Acesso →</button>
    <div class="code-hint" style="margin-top:14px">
      ✦ Após enviar, entraremos em contato pelo WhatsApp com seu código de acesso.
    </div>
  </div>

  <div class="back"><a href="index.html">← Voltar ao site</a></div>
</div>

<script>
// ══════════════════════════════════════
// SISTEMA DE ACESSO — SEM SUPABASE
// Código mestre do admin + códigos de usuários
// ══════════════════════════════════════

// CÓDIGO DO ADMIN (você, Wemerson)
const ADMIN_CODE = 'EKKLESIA2025';
const ADMIN_NAME_KEY = 'wemerson';

// Códigos de usuários ativos — você adiciona aqui quando libera acesso
// Formato: { codigo: 'PV-000001', nome: 'João Silva', ativo: true }
// VOCÊ PODE EDITAR ESSA LISTA DIRETAMENTE AQUI
const CODIGOS_ATIVOS = [
  { code: 'EKKLESIA2025', name: 'Admin', admin: true },
  // Adicione mais códigos conforme for liberando:
  // { code: 'PV-000001', name: '', admin: false },
  // { code: 'PV-000002', name: '', admin: false },
];

function showTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('on'));
  document.querySelectorAll('.form-block').forEach(f => f.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('form-' + tab).classList.add('on');
  clearMsg();
}

function showMsg(text, type) {
  const m = document.getElementById('msg');
  m.textContent = text;
  m.className = 'msg ' + type;
}

function clearMsg() {
  const m = document.getElementById('msg');
  m.className = 'msg';
  m.textContent = '';
}

function doLogin() {
  const name = document.getElementById('login-name').value.trim();
  const code = document.getElementById('login-code').value.trim().toUpperCase();

  if (!name) { showMsg('Digite seu nome.', 'err'); return; }
  if (!code) { showMsg('Digite seu código de acesso.', 'err'); return; }

  const btn = document.getElementById('btn-login');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span>Verificando...';

  // Verifica o código
  setTimeout(() => {
    const found = CODIGOS_ATIVOS.find(c => c.code === code);

    if (found) {
      // Código válido — salva sessão e vai pro app
      sessionStorage.setItem('pv_user_name', name);
      sessionStorage.setItem('pv_user_code', code);
      sessionStorage.setItem('pv_user_admin', found.admin ? '1' : '0');
      sessionStorage.setItem('pv_user_email', code + '@presencaviva.app');

      showMsg('✦ Bem-vindo(a), ' + name + '!', 'ok');
      setTimeout(() => {
        window.location.href = 'presenca-viva-app.html?nome=' + encodeURIComponent(name) + '&code=' + encodeURIComponent(code);
      }, 800);
    } else {
      showMsg('Código inválido. Verifique com o suporte.', 'err');
      btn.disabled = false;
      btn.innerHTML = 'Entrar na Presença →';
    }
  }, 600);
}

function doRegister() {
  const name = document.getElementById('reg-name').value.trim();
  const phone = document.getElementById('reg-phone').value.trim();
  const ref = document.getElementById('reg-ref').value.trim().toUpperCase();

  if (!name) { showMsg('Digite seu nome.', 'err'); return; }
  if (!phone) { showMsg('Digite seu WhatsApp.', 'err'); return; }

  const btn = document.getElementById('btn-register');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span>Enviando...';

  // Monta mensagem para WhatsApp
  const msg = encodeURIComponent(
    '🙏 *Nova solicitação de acesso — Presença Viva*\n\n' +
    '*Nome:* ' + name + '\n' +
    '*WhatsApp:* ' + phone + '\n' +
    (ref ? '*Código de indicação:* ' + ref + '\n' : '') +
    '\nPor favor, gostaria de ter acesso ao Presença Viva.'
  );

  setTimeout(() => {
    showMsg('✦ Redirecionando para o WhatsApp...', 'ok');
    setTimeout(() => {
      window.open('https://wa.me/5534984314362?text=' + msg, '_blank');
      btn.disabled = false;
      btn.innerHTML = 'Solicitar Acesso →';
    }, 800);
  }, 600);
}

// Enter para entrar
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const tab = document.querySelector('.form-block.on');
    if (tab && tab.id === 'form-entrar') doLogin();
    if (tab && tab.id === 'form-criar') doRegister();
  }
});
</script>
</body>
</html>
