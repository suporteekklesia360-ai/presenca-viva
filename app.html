<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presença Viva</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0d14;color:#e8d9b5;font-family:'Lato',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
.loading{text-align:center;padding:40px}
.cross{font-size:2.5rem;margin-bottom:16px}
.msg{color:#a09070;font-size:.9rem}
.spinner{width:32px;height:32px;border:3px solid rgba(201,168,76,.2);border-top-color:#c9a84c;border-radius:50%;animation:spin .8s linear infinite;margin:16px auto}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="loading">
  <div class="cross">✦</div>
  <div class="spinner"></div>
  <div class="msg">Entrando na Presença...</div>
</div>

<script>
const SUPABASE_URL = 'https://riiabvygpggittrthqiy.supabase.co';
const SUPABASE_KEY = 'sb_publishable_Tw-cSUMdG4Kxi1Nb4gVegg_m9IqZIvs';
const ADMIN_EMAIL = 'suporte.ekklesia360@gmail.com';

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function checkAccess() {
  try {
    // Verifica sessão com timeout de 5 segundos
    const sessionPromise = sb.auth.getSession();
    const timeoutPromise = new Promise((_, reject) =>
      setTimeout(() => reject(new Error('timeout')), 5000)
    );

    const { data: { session } } = await Promise.race([sessionPromise, timeoutPromise]);

    if (!session) {
      window.location.href = 'login.html';
      return;
    }

    const user = session.user;
    const email = user.email;
    const name = user.user_metadata?.name || email.split('@')[0];
    const isAdmin = email === ADMIN_EMAIL;

    // Admin sempre passa
    if (isAdmin) {
      goToApp(user, name, true);
      return;
    }

    // Verifica acesso no banco
    try {
      const { data: access } = await sb
        .from('users_access')
        .select('is_active')
        .eq('email', email)
        .eq('is_active', true)
        .maybeSingle();

      if (access) {
        goToApp(user, name, false);
      } else {
        window.location.href = 'login.html?blocked=1';
      }
    } catch(dbErr) {
      // Se o banco falhar, loga como usuário básico
      console.warn('DB error, allowing basic access:', dbErr);
      goToApp(user, name, false);
    }

  } catch(err) {
    console.warn('Auth error:', err.message);
    // Se Supabase falhar completamente, redireciona para login
    window.location.href = 'login.html';
  }
}

function goToApp(user, name, isAdmin) {
  sessionStorage.setItem('pv_user_id', user.id || '');
  sessionStorage.setItem('pv_user_name', name || '');
  sessionStorage.setItem('pv_user_email', user.email || '');
  sessionStorage.setItem('pv_user_admin', isAdmin ? '1' : '0');
  window.location.href = 'presenca-viva-app.html';
}

checkAccess();
</script>
</body>
</html>
